swagger: '2.0'
basePath: /
info:
  version: '0.1'
  title: API Gateway Resources
  description: ''
schemes:
- http
paths:
  /callback/{token}/:
    post:
      operationId: callback
      description: 节点回调入口
      tags:
      - 限制接口
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.callback_sub_path}taskflow/api/v4/nodes/callback/{token}/
          matchSubpath: false
          timeout: 0
          upstreams:
            loadbalance: roundrobin
            hosts:
            - host: http://{env.callback_host}
              weight: 100
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: false
          resourcePermissionRequired: false
        disabledStages: []
  /create_periodic_task/{template_id}/{bk_biz_id}/:
    post:
      operationId: create_periodic_task
      description: 创建周期任务
      tags:
      - 限制接口
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.api_sub_path}apigw/create_periodic_task/{template_id}/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /create_task/{template_id}/{bk_biz_id}/:
    post:
      operationId: create_task
      description: 通过业务流程模板创建任务
      tags:
      - 通用接口
      responses:
        '200':
          schema:
            type: object
            properties:
                  code:
                    type: integer
                    description: 错误码
                  data:
                    type: object
                    properties:
                      task_id:
                        type: integer
                        description: 任务实例ID
                      task_url:
                        type: string
                        description: 任务实例链接
                      pipeline_tree:
                        type: object
                        description: 任务实例树
                    description: result=true 时成功数据，详细信息请见下面说明
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.api_sub_path}apigw/create_task/{template_id}/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /dispatch_plugin_query/:
    post:
      operationId: dispatch_plugin_query
      description: 插件请求转发
      tags:
      - 限制接口
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.api_sub_path}apigw/dispatch_plugin_query/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /fast_create_task/{bk_biz_id}/:
    post:
      operationId: fast_create_task
      description: 创建一次性任务
      tags:
      - 限制接口
      responses:
        '200':
          schema:
            type: object
            properties:
                  data:
                    type: object
                    properties:
                      task_id:
                        type: integer
                        description: 任务实例ID
                      task_url:
                        type: string
                        description: 任务实例链接
                      pipeline_tree:
                        type: object
                        description: 任务实例树
                        additionalProperties: true
                    description: result=true 时成功数据，详细信息请见下面说明
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.api_sub_path}apigw/fast_create_task/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_common_template_info/{template_id}/:
    get:
      operationId: get_common_template_info
      description: 查询单个公共流程模板详情
      tags:
      - 通用接口
      responses:
        '200':
          schema:
            type: object
            properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: 模板ID
                      name:
                        type: string
                        description: 模板名称
                      editor:
                        type: string
                        description: 模板编辑人
                      creator:
                        type: string
                        description: 模板创建人
                      category:
                        type: string
                        description: 模板分类，OpsTools：运维工具，MonitorAlarm：监控告警，ConfManage：配置管理，DevTools：开发工具，EnterpriseIT：企业IT，OfficeApp：办公应用，Other：其它，Default：默认
                      edit_time:
                        type: string
                        description: 模板最新编辑时间
                      create_time:
                        type: string
                        description: 模板创建时间
                      pipeline_tree:
                        type: object
                        description: 模板任务树信息
                        additionalProperties: true
                    description: result=true 时模板详情，详细信息见下面说明
                  result:
                    type: boolean
                    description: true/false 查询成功与否
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/get_common_template_info/{template_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_common_template_list/:
    get:
      operationId: get_common_template_list
      description: 查询公共模板列表
      tags:
      - 通用接口
      responses:
        '200':
          schema:
            type: object
            properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: 模板ID
                        name:
                          type: string
                          description: 模板名称
                        editor:
                          type: string
                          description: 模板编辑人
                        creator:
                          type: string
                          description: 模板创建人
                        category:
                          type: string
                          description: 模板分类
                        edit_time:
                          type: string
                          description: 模板最新编辑时间
                        create_time:
                          type: string
                          description: 模板创建时间
                        auth_actions:
                          type: array
                          items:
                            type: string
                          description: 用户对该资源有权限的操作
                    description: result=true时模板列表，item 信息见下面说明
                  result:
                    type: boolean
                    description: true/false 查询成功与否
                  message:
                    type: string
                    description: result=false时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/get_common_template_list/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_periodic_task_info/{task_id}/{bk_biz_id}/:
    get:
      operationId: get_periodic_task_info
      description: 查询某个周期任务的详情
      tags:
      - 通用接口
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/get_periodic_task_info/{task_id}/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_periodic_task_list/{bk_biz_id}/:
    get:
      operationId: get_periodic_task_list
      description: 查询某个业务下所有的周期任务
      tags:
      - 通用接口
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/get_periodic_task_list/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_plugin_list/{bk_biz_id}/:
    get:
      operationId: get_plugin_list
      description: 查询某个业务下的插件列表
      tags:
      - 通用接口
      responses:
        '200':
          schema:
            type: object
            properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: 插件代码
                        desc:
                          type: string
                          description: 插件描述
                        form:
                          type: string
                          description: 插件表单静态资源链接
                        name:
                          type: string
                          description: 插件名
                        inputs:
                          type: array
                          items:
                            type: object
                          description: 插件输入参数列表
                        outputs:
                          type: array
                          items:
                            type: object
                          description: 插件输出参数列表
                        version:
                          type: string
                          description: 插件版本
                        group_name:
                          type: string
                          description: 插件组名
                    description: result=true 时成功数据，详细信息请见下面说明
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/get_plugin_list/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_tasks_status/{bk_biz_id}/:
    post:
      operationId: get_tasks_status
      description: 批量查询任务状态
      tags:
      - 通用接口
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.api_sub_path}apigw/get_tasks_status/{bk_biz_id}/
          matchSubpath: false
          timeout: 60
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_task_detail/{task_id}/{bk_biz_id}/:
    get:
      operationId: get_task_detail
      description: 查询任务执行详情
      tags:
      - 通用接口
      responses:
        '200':
          schema:
            type: object
            properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: 任务 ID，即 task_id
                      name:
                        type: string
                        description: 任务名称
                      creator:
                        type: string
                        description: 任务创建人
                      outputs:
                        type: array
                        items:
                          type: object
                        description: 任务输出参数
                      executor:
                        type: string
                        description: 任务执行人
                      task_url:
                        type: string
                        description: 任务实例链接
                      constants:
                        type: object
                        description: 输入的全局变量
                        additionalProperties: true
                      project_id:
                        type: integer
                        description: 所属项目 ID
                      start_time:
                        type: string
                        description: 任务执行时间
                      create_time:
                        type: string
                        description: 任务创建时间
                      finish_time:
                        type: string
                        description: 任务完成时间
                      template_id:
                        type: integer
                        description: 创建任务所用的流程模板 ID
                      elapsed_time:
                        type: integer
                        description: 任务执行耗时(秒）
                      project_name:
                        type: string
                        description: 所属项目名称
                      create_method:
                        type: string
                        description: 任务创建方式
                      pipeline_tree:
                        type: object
                        description: 任务实例树
                        additionalProperties: true
                    description: result=true 时返回数据，详细信息见下面说明
                  result:
                    type: boolean
                    description: true/false 查询成功与否
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/get_task_detail/{task_id}/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_task_list/{bk_biz_id}/:
    get:
      operationId: get_task_list
      description: 获取任务列表
      tags:
      - 通用接口
      responses:
        '200':
          schema:
            type: object
            properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: 任务ID
                        name:
                          type: string
                          description: 任务名
                        creator:
                          type: string
                          description: 任务创建者
                        category:
                          type: string
                          description: 任务类型
                        executor:
                          type: string
                          description: 任务执行者
                        bk_biz_id:
                          type: integer
                          description: 业务ID
                        is_started:
                          type: boolean
                          description: 任务是否已开始
                        project_id:
                          type: integer
                          description: 项目ID
                        start_time:
                          type: string
                          description: 任务开始时间
                        bk_biz_name:
                          type: string
                          description: 业务名称
                        finish_time:
                          type: string
                          description: 任务结束时间
                        is_finished:
                          type: boolean
                          description: 任务是否已结束
                        template_id:
                          type: string
                          description: 任务模版ID
                        auth_actions:
                          type: array
                          items:
                            type: string
                          description: 用户对该资源有权限的操作
                        project_name:
                          type: string
                          description: 项目名称
                        create_method:
                          type: string
                          description: 任务创建方式
                        template_source:
                          type: string
                          description: 任务模版来源，如项目模版project和公共模版common
                    description: result=true 时成功数据，详细信息请见下面说明
                  count:
                    type: integer
                    description: data列表数量
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/get_task_list/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_task_node_data/{bk_biz_id}/{task_id}/:
    get:
      operationId: get_task_node_data
      description: 获取节点执行时实际的输入输出参数
      tags:
      - 通用接口
      responses:
        '200':
          schema:
            type: object
            properties:
                  code:
                    type: integer
                    description: 错误码
                  data:
                    type: object
                    properties:
                      inputs:
                        type: object
                        description: 输入参数，key：value格式
                        additionalProperties: true
                      ex_data:
                        type: string
                        description: 节点执行失败详情，json字符串或者HTML字符串、普通字符串
                      outputs:
                        type: array
                        items:
                          type: object
                          properties:
                            key:
                              type: string
                              description: 输出参数 KEY
                            name:
                              type: string
                              description: 输出参数名称
                            value:
                              description: 输出参数值
                            preset:
                              type: boolean
                              description: 是否是原子定义中预设输出变量
                        description: 输出参数
                      execution_time:
                        type: array
                        items:
                          type: object
                          properties:
                            elapsed_time:
                              type: integer
                              description: 节点执行耗时，单位为秒
                            archived_time:
                              type: string
                              description: 节点执行时间
                        description: 节点执行时间
                    description: result=true 时返回数据，详情见下面说明
                  result:
                    type: boolean
                    description: true/false 成功与否
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/get_task_node_data/{bk_biz_id}/{task_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_task_node_detail/{task_id}/{bk_biz_id}/:
    get:
      operationId: get_task_node_detail
      description: 查询任务节点执行详情
      tags:
      - 通用接口
      responses:
        '200':
          schema:
            type: object
            properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: 节点 ID
                      skip:
                        type: boolean
                        description: 是否手动跳过
                      retry:
                        type: integer
                        description: 重试次数
                      state:
                        type: string
                        description: 最后一次执行状态，CREATED：未执行，RUNNING：执行中，FAILED：失败，NODE_SUSPENDED：暂停，FINISHED：成功
                      inputs:
                        type: object
                        description: 输入参数，key：value格式
                        additionalProperties: true
                      ex_data:
                        type: string
                        description: 节点执行失败详情，json字符串或者HTML字符串、普通字符串
                      outputs:
                        type: array
                        items:
                          type: object
                        description: 输出参数
                      histories:
                        type: array
                        items:
                          type: object
                        description: 重试记录详情
                      start_time:
                        type: string
                        description: 最后一次执行开始时间
                      finish_time:
                        type: string
                        description: 最后一次执行结束时间
                      elapsed_time:
                        type: integer
                        description: 最后一次执行耗时，单位秒
                    description: result=true 时返回数据，详细信息见下面说明
                  result:
                    type: boolean
                    description: true/false 查询成功与否
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/get_task_node_detail/{task_id}/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_task_status/{task_id}/{bk_biz_id}/:
    get:
      operationId: get_task_status
      description: 查询任务执行状态
      tags:
      - 通用接口
      responses:
        '200':
          schema:
            type: object
            properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: 任务或节点执行态ID，不等于 task_id
                      name:
                        type: string
                        description: 节点名称
                      skip:
                        type: boolean
                        description: 是否跳过执行
                      retry:
                        type: integer
                        description: 重试和跳过总次数
                      state:
                        type: string
                        description: 任务或节点状态，CREATED：未执行，RUNNING：执行中，FAILED：失败，SUSPENDED：暂停，REVOKED：已终止，FINISHED：已完成
                      ex_data:
                        type: object
                        description: key为失败节点ID，value为失败节点错误数据
                        additionalProperties: true
                      children:
                        type: object
                        description: 任务节点执行详情
                        additionalProperties: true
                      start_time:
                        type: string
                        description: 任务或节点执行开始时间
                      finish_time:
                        type: string
                        description: 任务或节点执行结束时间
                    description: result=true 时返回数据，详细信息见下面说明
                  result:
                    type: boolean
                    description: true/false 查询成功与否
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/get_task_status/{task_id}/{bk_biz_id}/
          matchSubpath: false
          timeout: 60
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_template_info/{template_id}/{bk_biz_id}/:
    get:
      operationId: get_template_info
      description: 查询业务下的单个模板详情
      tags:
      - 通用接口
      responses:
        '200':
          schema:
            type: object
            properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: 模板ID
                      name:
                        type: string
                        description: 模板名称
                      editor:
