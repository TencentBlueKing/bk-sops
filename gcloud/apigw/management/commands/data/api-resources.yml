openapi: 3.0.1
servers:
- url: /
info:
  version: '0.1'
  title: API Gateway Resources
  description: ''
paths:
  /callback/{token}/:
    post:
      operationId: callback
      description: 节点回调入口
      tags:
      - 限制接口
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.callback_sub_path}taskflow/api/v4/nodes/callback/{token}/
          matchSubpath: false
          timeout: 0
          upstreams:
            loadbalance: roundrobin
            hosts:
            - host: http://{env.callback_host}
              weight: 100
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: false
          resourcePermissionRequired: false
        disabledStages: []
  /create_periodic_task/{template_id}/{bk_biz_id}/:
    post:
      operationId: create_periodic_task
      description: 创建周期任务
      tags:
      - 限制接口
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.api_sub_path}apigw/create_periodic_task/{template_id}/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /create_task/{template_id}/{bk_biz_id}/:
    post:
      operationId: create_task
      description: 通过业务流程模板创建任务
      tags:
      - 通用接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    description: 错误码
                  data:
                    type: object
                    properties:
                      task_id:
                        type: integer
                        description: 任务实例ID
                      task_url:
                        type: string
                        description: 任务实例链接
                      pipeline_tree:
                        type: object
                        description: 任务实例树
                    description: result=true 时成功数据，详细信息请见下面说明
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      parameters:
      - in: path
        name: template_id
        schema:
          type: string
        required: true
        description: 模板ID
      - in: path
        name: bk_biz_id
        schema:
          type: string
        required: true
        description: 模板所属业务ID
      - in: query
        name: scope
        schema:
          type: string
          default: cmdb_biz
        required: false
        description: bk_biz_id 检索的作用域。默认为 cmdb_biz，此时检索的是绑定的 CMDB 业务 ID 为 bk_biz_id
          的项目；当值为 project 时则检索项目 ID 为 bk_biz_id 的项目
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                  description: 任务名称
                constants:
                  type: object
                  description: 任务全局参数，key为变量KEY（${key}格式），value为变量值
                  additionalProperties: true
                flow_type:
                  type: string
                  default: common
                  description: '任务流程类型，common: 常规流程，common_func：职能化流程'
                description:
                  type: string
                  description: 任务描述
                callback_url:
                  type: string
                  description: 任务执行完成后的回调地址
                pipeline_tree:
                  type: object
                  description: 任务实例树，用于直接创建任务
                  additionalProperties: true
                simplify_vars:
                  type: array
                  items:
                    type: string
                  description: 需要进行类型简化的参数 key 列表
                template_source:
                  type: string
                  default: business
                  description: 流程模板来源，business:默认值，业务流程，common：公共流程
                callback_version:
                  type: string
                  description: 回调版本
                exclude_task_nodes_id:
                  type: array
                  items:
                    type: string
                  description: 跳过执行的节点ID列表（与execute_task_nodes_id同时存在时execute_task_nodes_id优先）
                execute_task_nodes_id:
                  type: array
                  items:
                    type: string
                  description: 仅执行的节点ID列表（与exclude_task_nodes_id同时存在时execute_task_nodes_id优先）
        required: true
        description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.api_sub_path}apigw/create_task/{template_id}/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /dispatch_plugin_query/:
    post:
      operationId: dispatch_plugin_query
      description: 插件请求转发
      tags:
      - 限制接口
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.api_sub_path}apigw/dispatch_plugin_query/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /plugin-gateway/categories/:
    get:
      operationId: plugin_gateway_get_categories
      description: 查询插件分类
      tags:
      - 限制接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      categories:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: 分类 ID
                            name:
                              type: string
                              description: 分类名称
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/plugin-gateway/categories/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: true
          resourcePermissionRequired: true
        disabledStages: []
  /plugin-gateway/plugins/:
    get:
      operationId: plugin_gateway_get_plugin_list
      description: 查询插件列表
      tags:
      - 限制接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      total:
                        type: integer
                        description: 插件总数
                      apis:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: 插件 ID
                            name:
                              type: string
                              description: 插件名称
                            plugin_source:
                              type: string
                              description: 插件来源
                            plugin_code:
                              type: string
                              description: 插件代码
                            wrapper_version:
                              type: string
                              description: 统一协议版本
                            default_version:
                              type: string
                              description: 默认插件版本
                            latest_version:
                              type: string
                              description: 最新插件版本
                            versions:
                              type: array
                              items:
                                type: string
                              description: 可选版本列表
                            category:
                              type: string
                              description: 插件分类
                            meta_url_template:
                              type: string
                              description: 查询插件详情的 URL 模板
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  error_type:
                    type: string
                    description: 失败类型
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/plugin-gateway/plugins/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: true
          resourcePermissionRequired: true
        disabledStages: []
  /plugin-gateway/plugins/{plugin_id}/:
    get:
      operationId: plugin_gateway_get_plugin_detail
      description: 查询插件详情
      tags:
      - 限制接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: 插件 ID
                      plugin_version:
                        type: string
                        description: 当前返回的插件版本
                      url:
                        type: string
                        description: 创建执行记录的 URL
                      methods:
                        type: array
                        items:
                          type: string
                        description: 可调用方法
                      inputs:
                        type: array
                        items:
                          type: object
                        description: 输入 schema 列表
                      outputs:
                        type: array
                        items:
                          type: object
                        description: 输出 schema 列表
                      polling:
                        type: object
                        description: 轮询配置
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  error_type:
                    type: string
                    description: 失败类型
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      parameters:
      - in: path
        name: plugin_id
        schema:
          type: string
        required: true
        description: 插件 ID
      - in: query
        name: version
        schema:
          type: string
        required: false
        description: 插件版本；不传时使用默认版本
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/plugin-gateway/plugins/{plugin_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: true
          resourcePermissionRequired: true
        disabledStages: []
  /plugin-gateway/runs/:
    post:
      operationId: plugin_gateway_create_run
      description: 创建插件执行记录
      tags:
      - 限制接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      open_plugin_run_id:
                        type: string
                        description: 运行 ID
                      status:
                        type: string
                        description: 当前运行状态
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  error_type:
                    type: string
                    description: 失败类型
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - source_key
              - plugin_id
              - plugin_version
              - client_request_id
              - callback_url
              - callback_token
              properties:
                source_key:
                  type: string
                  description: 来源标识
                plugin_id:
                  type: string
                  description: 插件 ID
                plugin_version:
                  type: string
                  description: 插件版本
                client_request_id:
                  type: string
                  description: 幂等键
                callback_url:
                  type: string
                  description: 回调地址
                callback_token:
                  type: string
                  description: 回调 token
                inputs:
                  type: object
                  additionalProperties: true
                  description: 插件输入
                project_id:
                  type: integer
                  description: 项目 ID
                operator:
                  type: string
                  description: 可选操作人；用于下游插件鉴权与审计
        required: true
        description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.api_sub_path}apigw/plugin-gateway/runs/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: true
          resourcePermissionRequired: true
        disabledStages: []
  /plugin-gateway/runs/status/:
    get:
      operationId: plugin_gateway_get_run_status
      description: 查询插件执行状态
      tags:
      - 限制接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        description: 运行状态
                      outputs:
                        type: object
                        additionalProperties: true
                        description: 输出数据
                      error_message:
                        type: string
                        description: 错误信息
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      parameters:
      - in: query
        name: task_tag
        schema:
          type: string
        required: true
        description: 运行 ID，对应 open_plugin_run_id
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/plugin-gateway/runs/status/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: true
          resourcePermissionRequired: true
        disabledStages: []
  /plugin-gateway/runs/{run_id}/:
    get:
      operationId: plugin_gateway_get_run_detail
      description: 查询插件执行详情
      tags:
      - 限制接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      open_plugin_run_id:
                        type: string
                        description: 运行 ID
                      status:
                        type: string
                        description: 运行状态
                      plugin_id:
                        type: string
                        description: 插件 ID
                      plugin_version:
                        type: string
                        description: 插件版本
                      outputs:
                        type: object
                        additionalProperties: true
                        description: 输出数据
                      error_message:
                        type: string
                        description: 错误信息
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      parameters:
      - in: path
        name: run_id
        schema:
          type: string
        required: true
        description: 运行 ID
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/plugin-gateway/runs/{run_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: true
          resourcePermissionRequired: true
        disabledStages: []
  /plugin-gateway/runs/{run_id}/cancel/:
    post:
      operationId: plugin_gateway_cancel_run
      description: 取消插件执行记录
      tags:
      - 限制接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      open_plugin_run_id:
                        type: string
                        description: 运行 ID
                      status:
                        type: string
                        description: 更新后的状态
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      parameters:
      - in: path
        name: run_id
        schema:
          type: string
        required: true
        description: 运行 ID
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.api_sub_path}apigw/plugin-gateway/runs/{run_id}/cancel/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: true
          resourcePermissionRequired: true
        disabledStages: []
  /plugin-gateway/runs/{run_id}/cancel:
    post:
      operationId: plugin_gateway_cancel_run_compat
      description: 取消插件执行记录（兼容无尾斜杠路径）
      tags:
      - 限制接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      open_plugin_run_id:
                        type: string
                        description: 运行 ID
                      status:
                        type: string
                        description: 更新后的状态
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      parameters:
      - in: path
        name: run_id
        schema:
          type: string
        required: true
        description: 运行 ID
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.api_sub_path}apigw/plugin-gateway/runs/{run_id}/cancel
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: false
          appVerifiedRequired: true
          resourcePermissionRequired: true
        disabledStages: []
  /fast_create_task/{bk_biz_id}/:
    post:
      operationId: fast_create_task
      description: 创建一次性任务
      tags:
      - 限制接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      task_id:
                        type: integer
                        description: 任务实例ID
                      task_url:
                        type: string
                        description: 任务实例链接
                      pipeline_tree:
                        type: object
                        description: 任务实例树
                        additionalProperties: true
                    description: result=true 时成功数据，详细信息请见下面说明
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      parameters:
      - in: path
        name: bk_biz_id
        schema:
          type: integer
        required: true
        description: 项目ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              - pipeline_tree
              properties:
                name:
                  type: string
                  description: 任务名称
                category:
                  type: string
                  description: 任务分类
                flow_type:
                  type: string
                  default: common
                  description: '任务流程类型，common: 常规流程，common_func：职能化流程，默认值为common'
                description:
                  type: string
                  description: 任务描述
                pipeline_tree:
                  type: object
                  description: 任务实例树，详细信息请见下面说明
                  additionalProperties: true
                has_common_subprocess:
                  type: boolean
                  default: false
                  description: 所包含的子流程来源，true：来自公共流程模版，false：来自项目流程模版，默认值为false
        required: true
        description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: false
        matchSubpath: false
        backend:
          type: HTTP
          method: post
          path: /{env.api_sub_path}apigw/fast_create_task/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_common_template_info/{template_id}/:
    get:
      operationId: get_common_template_info
      description: 查询单个公共流程模板详情
      tags:
      - 通用接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: 模板ID
                      name:
                        type: string
                        description: 模板名称
                      editor:
                        type: string
                        description: 模板编辑人
                      creator:
                        type: string
                        description: 模板创建人
                      category:
                        type: string
                        description: 模板分类，OpsTools：运维工具，MonitorAlarm：监控告警，ConfManage：配置管理，DevTools：开发工具，EnterpriseIT：企业IT，OfficeApp：办公应用，Other：其它，Default：默认
                      edit_time:
                        type: string
                        description: 模板最新编辑时间
                      create_time:
                        type: string
                        description: 模板创建时间
                      pipeline_tree:
                        type: object
                        description: 模板任务树信息
                        additionalProperties: true
                    description: result=true 时模板详情，详细信息见下面说明
                  result:
                    type: boolean
                    description: true/false 查询成功与否
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      parameters:
      - in: path
        name: template_id
        schema:
          type: string
        required: true
        description: 模板ID
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        backend:
          type: HTTP
          method: get
          path: /{env.api_sub_path}apigw/get_common_template_info/{template_id}/
          matchSubpath: false
          timeout: 0
          upstreams: {}
          transformHeaders: {}
        authConfig:
          userVerifiedRequired: true
        disabledStages: []
  /get_common_template_list/:
    get:
      operationId: get_common_template_list
      description: 查询公共模板列表
      tags:
      - 通用接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
