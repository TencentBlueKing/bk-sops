                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: 计划任务 ID
                      creator:
                        type: string
                        description: 创建者
                      task_id:
                        type: integer
                        description: 任务 ID，任务未创建时为 null
                      task_name:
                        type: string
                        description: 任务名
                      project_id:
                        type: integer
                        description: 项目 ID
                      template_id:
                        type: integer
                        description: 模板 ID
                      template_name:
                        type: string
                        description: 模板名称
                      clocked_task_id:
                        type: integer
                        description: 计划任务ID
                      plan_start_time:
                        type: string
                        description: 计划任务开始时间
                      task_parameters:
                        type: object
                        properties:
                          constants:
                            type: object
                            description: 计划任务参数，对应变量key和value
                            additionalProperties: true
                          template_schemes_id:
                            type: array
                            items:
                              type: integer
                            description: 计划任务使用的执行方案列表
                        description: 任务参数
                      template_source:
                        type: string
                        description: 模板来源
                    description: result=true 时成功数据，详细信息请见下面说明
                  result:
                    type: boolean
                    description: true/false 操作是否成功
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      parameters:
      - in: path
        name: template_id
        schema:
          type: string
        required: true
        description: 用于创建任务的模板ID
      - in: path
        name: bk_biz_id
        schema:
          type: string
        required: true
        description: 任务所属业务ID
      - in: query
        name: scope
        schema:
          type: string
          default: cmdb_biz
        required: false
        description: bk_biz_id 检索的作用域。默认为 cmdb_biz，此时检索的是绑定的 CMDB 业务 ID 为 bk_biz_id
          的项目；当值为 project 时则检索项目 ID 为 bk_biz_id 的项目
      requestBody:
