              - plan_start_time
              properties:
                task_name:
                  type: string
                  description: 要创建的计划任务名称
                plan_start_time:
                  type: string
                  description: 计划任务开始时间，推荐带上时区信息，格式如 2022-05-16 20:26:40+0800
                task_parameters:
                  type: object
                  properties:
                    constants:
                      type: object
                      description: 计划任务参数，对应变量key和value，默认为 {}
                      additionalProperties: true
                    template_schemes_id:
                      type: array
                      items:
                        type: integer
                      description: 计划任务使用的执行方案列表，默认为 []，代表执行所有流程节点
                  description: 任务参数
        required: true
        description: ''
      x-bk-apigateway-resource:
        isPublic: false
        allowApplyPermission: false
        matchSubpath: false
