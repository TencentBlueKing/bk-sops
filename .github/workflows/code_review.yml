name: CodeBuddy 代码评审

on:
  # 使用 pull_request_target 以访问 secrets
  # 但添加安全检查，只对可信任的贡献者自动运行
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  # 第一步：安全检查
  security-check:
    name: 安全检查
    runs-on: ubuntu-latest
    outputs:
      is_safe: ${{ steps.check.outputs.is_safe }}
      author_association: ${{ steps.check.outputs.author_association }}
    steps:
      - name: 检查贡献者身份
        id: check
        run: |
          echo "作者关联: ${{ github.event.pull_request.author_association }}"
          # 允许的身份：OWNER（所有者）、MEMBER（成员）、COLLABORATOR（协作者）
          if [[ "${{ github.event.pull_request.author_association }}" == "OWNER" ]] || \
             [[ "${{ github.event.pull_request.author_association }}" == "MEMBER" ]] || \
             [[ "${{ github.event.pull_request.author_association }}" == "COLLABORATOR" ]]; then
            echo "✅ 可信任的贡献者，允许自动审查"
            echo "is_safe=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ 外部贡献者，需要手动批准"
            echo "is_safe=false" >> $GITHUB_OUTPUT
          fi
          echo "author_association=${{ github.event.pull_request.author_association }}" >> $GITHUB_OUTPUT
  # 第二步：代码审查（只对可信贡献者自动运行）
  code-review:
    name: 自动代码审查
    needs: security-check
    # 只对可信贡献者自动运行
    if: needs.security-check.outputs.is_safe == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 安装 CodeBuddy CLI
        run: |
          npm install -g @tencent-ai/codebuddy-code
          echo "✅ CodeBuddy CLI 安装完成"
      - name: 配置 CodeBuddy CLI
        env:
          CODEBUDDY_API_KEY: ${{ secrets.CODEBUDDY_API_KEY }}
          CODEBUDDY_INTERNET_ENVIRONMENT: iOA
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$CODEBUDDY_API_KEY" ]; then
            echo "⚠️ 警告: CODEBUDDY_API_KEY 未设置，CodeBuddy 可能无法正常工作"
            echo "请在 GitHub 仓库的 Settings -> Secrets and variables -> Actions 中添加 CODEBUDDY_API_KEY"
          else
            echo "✅ CodeBuddy API Key 已配置"
            export CODEBUDDY_API_KEY="$CODEBUDDY_API_KEY"
          fi
          echo "🔧 配置 GitHub MCP Server..."
          CODEBUDDY_CONFIG_DIR="$HOME/.config/codebuddy"
          mkdir -p "$CODEBUDDY_CONFIG_DIR"
          MCP_CONFIG_FILE="$CODEBUDDY_CONFIG_DIR/mcp.json"
          node -e "
            const fs = require('fs');
            const config = {
              mcpServers: {
                github: {
                  command: 'npx',
                  args: ['-y', '@modelcontextprotocol/server-github'],
                  env: {
                    GITHUB_PERSONAL_ACCESS_TOKEN: process.env.GH_TOKEN || ''
                  }
                }
              }
            };
            fs.writeFileSync('$MCP_CONFIG_FILE', JSON.stringify(config, null, 2));
            console.log('✅ GitHub MCP Server 配置已创建');
          "
          echo "📋 MCP 配置文件位置: $MCP_CONFIG_FILE"
          echo "📋 配置文件内容:"
          cat "$MCP_CONFIG_FILE"
      - name: 执行代码审查
        env:
          CODEBUDDY_API_KEY: ${{ secrets.CODEBUDDY_API_KEY }}
          CODEBUDDY_INTERNET_ENVIRONMENT: iOA
          GH_TOKEN: ${{ github.token }}
          CI: true
        run: |
          echo "🚀 开始执行 CodeBuddy 代码审查..."
          if ! command -v codebuddy &> /dev/null && ! command -v cbc &> /dev/null; then
            echo "❌ codebuddy 命令未找到"
            exit 1
          fi
          CODEBUDDY_CMD="codebuddy -p --dangerously-skip-permissions --model claude-opus-4.6"
          if ! command -v codebuddy &> /dev/null; then
            CODEBUDDY_CMD="cbc -p --dangerously-skip-permissions --model claude-opus-4.6"
          fi
          echo "🔍 验证 CodeBuddy CLI 连通性..."
          VERIFY_RESULT=$($CODEBUDDY_CMD "回复ok" 2>&1) || true
          echo "验证结果: $VERIFY_RESULT"
          if echo "$VERIFY_RESULT" | grep -qi "ok"; then
            echo "✅ CodeBuddy CLI 验证通过"
          else
            echo "❌ CodeBuddy CLI 验证失败，请检查 API Key 和网络配置"
            echo "详细输出: $VERIFY_RESULT"
            exit 1
          fi
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          echo "📦 仓库: $REPO"
          echo "📦 PR 编号: $PR_NUMBER"
          echo "📦 Head SHA: $HEAD_SHA"
          echo "📦 Base SHA: $BASE_SHA"
          REVIEW_PROMPT=$(cat <<EOF
          你当前在 GitHub Actions runner 中执行自动化代码审查。gh CLI 可用并已通过 GH_TOKEN 认证。你可以在拉取请求上发表评论。

          ## 上下文

          - 仓库：${REPO}
          - PR 编号：${PR_NUMBER}
          - PR Head SHA：${HEAD_SHA}
          - PR Base SHA：${BASE_SHA}

          ## 项目文档

          在审查代码时，请参考以下项目文档以理解架构设计和业务上下文：
          - docs/zh_hans/ — 中文文档（guide/ develop/ deploy/ ops/ wiki/ apidoc/）
          - docs/en/ — 英文文档（guide/ develop/ deploy/ wiki/ apidoc/）
          - docs/specs/ — 设计文档（brainstorming 输出）
          - docs/plans/ — 实现计划（writing-plans 输出）
          - .cursor/rules/docs-management.mdc — 文档目录管理规范

          审查时应结合这些文档判断：
          1) 代码变更是否与已有架构设计一致
          2) 是否有需要同步更新的文档
          3) 新增功能是否遵循了文档中描述的设计模式
          4) 文档是否放在了正确的目录（参考 docs-management.mdc）

          ## API 网关同步规则

          若 PR 涉及 gcloud/apigw/ 下的变更，需检查以下同步项：
          1) 新增/修改 API 视图 → 对应文档 docs/zh_hans/apidoc/{api_name}.md 和 docs/en/apidoc/{api_name}.md 是否已同步更新
          2) 新增 API → apigw/bk_apigw_resources_bk-sops_mcp_additions.yaml 是否已添加资源定义
          3) 已注册接口补全 schema → apigw/bk_apigw_resources_bk-sops_mcp_supplement.yaml 是否已更新
          4) 文档更新后 → apigw-docs.tgz 是否已重新生成
          5) 修改了 Serializer 字段 → 文档中的接口参数表格是否同步更新

          ## 目标

          1) 复核已有审查评论，若已处理则回复：已解决
          2) 审查当前 PR diff，仅标注明确且高严重度的问题
          3) 结合项目文档判断代码变更的合理性，检查是否需要更新文档
          4) 只在变更的行留下非常简短的行内评论（1-2 句），并在末尾给出简要总结

          ## 流程

          - 获取已有评论：gh pr view ${PR_NUMBER} --json comments
          - 获取 diff：gh pr diff ${PR_NUMBER}
          - 按需阅读项目文档：cat docs/guide/architecture.md 等
          - 若先前报告的问题似乎已被附近的更改修复，回复：✅ 此问题似乎已被最近的更改解决
          - 避免重复：如果同类反馈已在相同行或附近存在，则跳过

          ## 评论规则

          - 最多 10 条行内评论；优先处理最关键的问题
          - 每条评论只包含一个问题；放在准确的变更行
          - 语气自然，具体且可执行；不要提及自动化或高置信度
          - 使用表情：🚨 严重 🔒 安全 ⚡ 性能 ⚠️ 逻辑 ✅ 已解决 ✨ 改进

          ## 提交

          - 提交一次审查，包含行内评论与简明总结
          - 仅使用：gh pr review ${PR_NUMBER} --comment
          - 不要使用：gh pr review --approve 或 --request-changes
          EOF
          )
          echo "========== CodeBuddy 审查开始 =========="
          $CODEBUDDY_CMD "$REVIEW_PROMPT" 2>&1 | tee /tmp/review_output.txt
          REVIEW_EXIT_CODE=${PIPESTATUS[0]}
          echo "========== CodeBuddy 审查结束 =========="
          echo "退出码: $REVIEW_EXIT_CODE"
          if [ $REVIEW_EXIT_CODE -ne 0 ]; then
            echo "❌ CodeBuddy 审查异常退出"
            exit $REVIEW_EXIT_CODE
          fi
