openapi: 3.0.1
servers:
- url: /
info:
  version: '2.0'
  title: API Gateway Resources - MCP Supplement
  description: 标准运维已注册接口 schema 补全
paths:
  /get_tasks_status/{bk_biz_id}/:
    post:
      operationId: get_tasks_status
      description: 批量查询任务执行状态（最多50个）
      tags:
      - 通用接口
      parameters:
      - in: path
        name: bk_biz_id
        schema:
          type: string
        required: true
        description: 项目唯一 ID，项目 ID 或 CMDB 业务 ID。调用传参时，务必在路径参数（path_params）中传入当前参数
      - in: query
        name: scope
        schema:
          type: string
          default: cmdb_biz
        description: 唯一 ID 的范围，取值为 cmdb_biz 或 project，为 cmdb_biz 时 bk_biz_id 代表业务
          ID，反之代表项目 ID，不传时默认为 cmdb_biz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - task_id_list
              properties:
                task_id_list:
                  type: array
                  items:
                    type: integer
                  description: 任务 ID 列表，限制最多查询 50 个任务
                include_children_status:
                  type: boolean
                  default: false
                  description: 返回的结果中是否包含任务中各节点的状态信息
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: boolean
                    description: true/false 查询成功与否
                  message:
                    type: string
                    description: result=false 时错误信息
                  code:
                    type: integer
                    description: 错误码
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: 任务ID
                        name:
                          type: string
                          description: 任务名称
                        status:
                          type: object
                          description: 任务状态详情
                          properties:
                            id:
                              type: string
                              description: 节点ID
                            state:
                              type: string
                              description: 执行状态（CREATED/RUNNING/FAILED/NODE_SUSPENDED/FINISHED）
                            name:
                              type: string
                              description: 节点名
                            retry:
                              type: integer
                              description: 重试次数
                            loop:
                              type: integer
                              description: 循环次数
                            skip:
                              type: boolean
                              description: 是否跳过
                            error_ignorable:
                              type: boolean
                              description: 是否忽略错误
                            version:
                              type: string
                              description: 节点版本
                            elapsed_time:
                              type: integer
                              description: 节点耗时（秒）
                            start_time:
                              type: string
                              description: 节点开始时间
                            finish_time:
                              type: string
                              description: 节点完成时间
                            children:
                              type: object
                              description: 子节点状态详情（include_children_status=true 时返回），key
                                为节点执行态 ID，value 结构同 status
                              additionalProperties:
                                type: object
                        flow_type:
                          type: string
                          description: 任务流程类型（common:普通流程任务, common_func:职能化任务）
                        current_flow:
                          type: string
                          description: 任务当前流程阶段（select_steps/fill_params/execute_task/finished
                            等）
                        is_deleted:
                          type: boolean
                          description: 任务是否已删除
                        create_time:
                          type: string
                          description: 任务创建时间
                        start_time:
                          type: string
                          description: 任务开始时间
                        finish_time:
                          type: string
                          description: 任务完成时间
                        url:
                          type: string
                          description: 任务链接
                    description: 任务状态列表
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /{env.api_sub_path}apigw/get_tasks_status/{bk_biz_id}/
          matchSubpath: false
          timeout: 60
        pluginConfigs:
        - type: bk-rate-limit
          yaml: "rates:\n  __default:\n  - period: 1\n    tokens: 10\n  bksops:\n\
            \  - period: 1\n    tokens: 1000\n"
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
        descriptionEn: Batch query tasks execution status (max 50)
  /node_callback/{task_id}/{bk_biz_id}/:
    post:
      operationId: node_callback
      description: 回调指定的节点（通常用于暂停等待类节点的人工审批回调场景）
      tags:
      - 通用接口
      parameters:
      - in: path
        name: task_id
        schema:
          type: string
        required: true
        description: 任务ID。调用传参时，务必在路径参数（path_params）中传入当前参数
      - in: path
        name: bk_biz_id
        schema:
          type: string
        required: true
        description: 项目唯一 ID，项目 ID 或 CMDB 业务 ID。调用传参时，务必在路径参数（path_params）中传入当前参数
      - in: query
        name: scope
        schema:
          type: string
          default: cmdb_biz
        description: 唯一 ID 的范围，取值为 cmdb_biz 或 project，为 cmdb_biz 时 bk_biz_id 代表业务
          ID，反之代表项目 ID，不传时默认为 cmdb_biz
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - node_id
              properties:
                node_id:
                  type: string
                  description: 节点 ID
                callback_data:
                  type: object
                  description: 回调数据，传递给节点的回调参数
                  additionalProperties: true
                version:
                  type: string
                  description: 节点版本号，用于指定回调的节点版本
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: boolean
                    description: true/false 操作成功与否
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: post
          path: /{env.api_sub_path}apigw/node_callback/{task_id}/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
        pluginConfigs:
        - type: bk-rate-limit
          yaml: "rates:\n  __default:\n  - tokens: 20\n    period: 1\n  bksops:\n\
            \  - tokens: 1000\n    period: 1\n"
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
        descriptionEn: Callback a specific node (for manual approval scenarios)
  /get_template_info/{template_id}/{bk_biz_id}/:
    get:
      operationId: get_template_info
      description: 查询业务下的单个模板详情
      tags:
      - 通用接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: 模板ID
                      name:
                        type: string
                        description: 模板名称
                      editor:
                        type: string
                        description: 模板编辑人
                      creator:
                        type: string
                        description: 模板创建人
                      category:
                        type: string
                        description: 模板分类，OpsTools：运维工具，MonitorAlarm：监控告警，ConfManage：配置管理，DevTools：开发工具，EnterpriseIT：企业IT，OfficeApp：办公应用，Other：其它
                      bk_biz_id:
                        type: string
                        description: 模板所属业务ID
                      edit_time:
                        type: string
                        description: 模板最新编辑时间
                      project_id:
                        type: string
                        description: 模板所属项目ID
                      bk_biz_name:
                        type: string
                        description: 模板所属业务名称
                      create_time:
                        type: string
                        description: 模板创建时间
                      project_name:
                        type: string
                        description: 模板所属项目名称
                      pipeline_tree:
                        description: 模板任务树信息。format=json（默认）时为 object；format=yaml 时为
                          YAML schema 字符串（含 schema_version/meta/spec 结构，与页面导出一致）
                        oneOf:
                        - type: object
                          additionalProperties: true
                        - type: string
                    description: result=true 时模板详情。MCP 请求时 pipeline_tree 默认不返回，传入
                      include_pipeline_tree=true 时返回裁剪后版本
                  result:
                    type: boolean
                    description: true/false 查询成功与否
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
                  request_id:
                    type: string
                    description: esb 请求 id
          description: ''
      parameters:
      - in: path
        name: template_id
        schema:
          type: string
        required: true
        description: 模板ID。调用传参时，务必在路径参数（path_params）中传入当前参数
      - in: path
        name: bk_biz_id
        schema:
          type: string
        required: true
        description: 模板所属业务ID。调用传参时，务必在路径参数（path_params）中传入当前参数
      - in: query
        name: template_source
        schema:
          type: string
          default: business
        required: false
        description: 流程模板来源，business:默认值，业务流程，common：公共流程
      - in: query
        name: scope
        schema:
          type: string
          default: cmdb_biz
        required: false
        description: bk_biz_id 检索的作用域。默认为 cmdb_biz，此时检索的是绑定的 CMDB 业务 ID 为 bk_biz_id
          的项目；当值为 project 时则检索项目 ID 为 bk_biz_id 的项目
      - in: query
        name: include_pipeline_tree
        required: false
        schema:
          type: boolean
          default: false
        description: 仅 MCP 请求有效。设置为 true 时返回裁剪后的 pipeline_tree（移除画布坐标、前端渲染字段等冗余数据，保留流程结构语义信息）。默认不返回
          pipeline_tree。
      - in: query
        name: format
        required: false
        schema:
          type: string
          enum:
          - json
          - yaml
          default: json
        description: pipeline_tree 的返回格式。json（默认）返回原始 JSON 对象；yaml 返回与页面导出一致的
          YAML schema 字符串（含 schema_version/meta/spec 结构）
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: get
          path: /{env.api_sub_path}apigw/get_template_info/{template_id}/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
        pluginConfigs:
        - type: bk-rate-limit
          yaml: "rates:\n  __default:\n  - tokens: 20\n    period: 1\n  csigssd:\n\
            \  - tokens: 50\n    period: 1\n  devops-sops:\n  - tokens: 50\n    period:\
            \ 1\n  bksops:\n  - tokens: 1000\n    period: 1\n  bcs-sops:\n  - tokens:\
            \ 200\n    period: 1\n  bk-audit:\n  - tokens: 25\n    period: 1\n"
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
        descriptionEn: None
  /get_task_detail/{task_id}/{bk_biz_id}/:
    get:
      operationId: get_task_detail
      description: 查询任务执行详情
      tags:
      - 通用接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: 任务 ID，即 task_id
                      name:
                        type: string
                        description: 任务名称
                      creator:
                        type: string
                        description: 任务创建人
                      outputs:
                        type: array
                        items:
                          type: object
                        description: 任务输出参数
                      executor:
                        type: string
                        description: 任务执行人
                      task_url:
                        type: string
                        description: 任务实例链接
                      constants:
                        type: object
                        description: 输入的全局变量
                        additionalProperties: true
                      project_id:
                        type: integer
                        description: 所属项目 ID
                      start_time:
                        type: string
                        description: 任务执行时间
                      create_time:
                        type: string
                        description: 任务创建时间
                      finish_time:
                        type: string
                        description: 任务完成时间
                      template_id:
                        type: integer
                        description: 创建任务所用的流程模板 ID
                      elapsed_time:
                        type: integer
                        description: 任务执行耗时(秒）
                      project_name:
                        type: string
                        description: 所属项目名称
                      create_method:
                        type: string
                        description: 任务创建方式
                      pipeline_tree:
                        type: object
                        description: 任务实例树
                        additionalProperties: true
                    description: result=true 时返回数据。MCP 请求时 pipeline_tree 默认不返回（传入
                      include_pipeline_tree=true 返回裁剪版），task_webhook_history 不返回
                  result:
                    type: boolean
                    description: true/false 查询成功与否
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      parameters:
      - in: path
        name: task_id
        schema:
          type: string
        required: true
        description: 任务ID。调用传参时，务必在路径参数（path_params）中传入当前参数
      - in: path
        name: bk_biz_id
        schema:
          type: string
        required: true
        description: 所属业务ID。调用传参时，务必在路径参数（path_params）中传入当前参数
      - in: query
        name: scope
        schema:
          type: string
          default: cmdb_biz
        required: false
        description: bk_biz_id 检索的作用域。默认为 cmdb_biz，此时检索的是绑定的 CMDB 业务 ID 为 bk_biz_id
          的项目；当值为 project 时则检索项目 ID 为 bk_biz_id 的项目
      - in: query
        name: include_pipeline_tree
        required: false
        schema:
          type: boolean
          default: false
        description: 仅 MCP 请求有效。设置为 true 时返回裁剪后的 pipeline_tree（移除画布坐标、前端渲染字段等冗余数据，保留流程结构语义信息）。默认不返回
          pipeline_tree。
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: get
          path: /{env.api_sub_path}apigw/get_task_detail/{task_id}/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
        pluginConfigs:
        - type: bk-rate-limit
          yaml: "rates:\n  __default:\n  - tokens: 20\n    period: 1\n  csigssd:\n\
            \  - tokens: 50\n    period: 1\n  devops-sops:\n  - tokens: 50\n    period:\
            \ 1\n  bksops:\n  - tokens: 1000\n    period: 1\n  opsbot2:\n  - tokens:\
            \ 40\n    period: 1\n"
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
        descriptionEn: None
  /get_common_template_info/{template_id}/:
    get:
      operationId: get_common_template_info
      description: 查询单个公共流程模板详情
      tags:
      - 通用接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: 模板ID
                      name:
                        type: string
                        description: 模板名称
                      editor:
                        type: string
                        description: 模板编辑人
                      creator:
                        type: string
                        description: 模板创建人
                      category:
                        type: string
                        description: 模板分类，OpsTools：运维工具，MonitorAlarm：监控告警，ConfManage：配置管理，DevTools：开发工具，EnterpriseIT：企业IT，OfficeApp：办公应用，Other：其它，Default：默认
                      edit_time:
                        type: string
                        description: 模板最新编辑时间
                      create_time:
                        type: string
                        description: 模板创建时间
                      pipeline_tree:
                        type: object
                        description: 模板任务树信息
                        additionalProperties: true
                    description: result=true 时模板详情。MCP 请求时 pipeline_tree 默认不返回（传入
                      include_pipeline_tree=true 返回裁剪版），template_constants 不返回
                  result:
                    type: boolean
                    description: true/false 查询成功与否
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      parameters:
      - in: path
        name: template_id
        schema:
          type: string
        required: true
        description: 模板ID。调用传参时，务必在路径参数（path_params）中传入当前参数
      - in: query
        name: include_pipeline_tree
        required: false
        schema:
          type: boolean
          default: false
        description: 仅 MCP 请求有效。设置为 true 时返回裁剪后的 pipeline_tree（移除画布坐标、前端渲染字段等冗余数据，保留流程结构语义信息）。默认不返回
          pipeline_tree。
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: get
          path: /{env.api_sub_path}apigw/get_common_template_info/{template_id}/
          matchSubpath: false
          timeout: 0
        pluginConfigs:
        - type: bk-rate-limit
          yaml: "rates:\n  __default:\n  - tokens: 20\n    period: 1\n  csigssd:\n\
            \  - tokens: 50\n    period: 1\n  devops-sops:\n  - tokens: 50\n    period:\
            \ 1\n  bksops:\n  - tokens: 1000\n    period: 1\n  bcs-sops:\n  - tokens:\
            \ 200\n    period: 1\n  bk-audit:\n  - tokens: 25\n    period: 1\n"
        authConfig:
          userVerifiedRequired: true
          appVerifiedRequired: true
          resourcePermissionRequired: true
        descriptionEn: None
  /get_task_node_detail/{task_id}/{bk_biz_id}/:
    get:
      operationId: get_task_node_detail
      description: 查询任务节点执行详情
      tags:
      - 通用接口
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: 节点 ID
                      skip:
                        type: boolean
                        description: 是否手动跳过
                      retry:
                        type: integer
                        description: 重试次数
                      state:
                        type: string
                        description: 最后一次执行状态，CREATED：未执行，RUNNING：执行中，FAILED：失败，NODE_SUSPENDED：暂停，FINISHED：成功
                      inputs:
                        type: object
                        description: 输入参数，key：value格式
                        additionalProperties: true
                      ex_data:
                        type: string
                        description: 节点执行失败详情，json字符串或者HTML字符串、普通字符串
                      outputs:
                        type: array
                        items:
                          type: object
                        description: 输出参数
                      histories:
                        type: array
                        items:
                          type: object
                        description: 重试记录详情
                      start_time:
                        type: string
                        description: 最后一次执行开始时间
                      finish_time:
                        type: string
                        description: 最后一次执行结束时间
                      elapsed_time:
                        type: integer
                        description: 最后一次执行耗时，单位秒
                    description: result=true 时返回数据。MCP 请求时 histories 仅返回最近 3 条（可通过
                      max_histories 参数调整）
                  result:
                    type: boolean
                    description: true/false 查询成功与否
                  message:
                    type: string
                    description: result=false 时错误信息
                  trace_id:
                    type: string
                    description: open telemetry trace_id
          description: ''
      parameters:
      - in: path
        name: task_id
        schema:
          type: string
        required: true
        description: 任务ID。调用传参时，务必在路径参数（path_params）中传入当前参数
      - in: path
        name: bk_biz_id
        schema:
          type: string
        required: true
        description: 所属业务ID。调用传参时，务必在路径参数（path_params）中传入当前参数
      - in: query
        name: node_id
        schema:
          type: string
        required: true
        description: 节点 ID
      - in: query
        name: component_code
        schema:
          type: string
        required: false
        description: 标准插件编码，请求标准插件执行详情必填
      - in: query
        name: subprocess_stack
        schema:
          type: string
        required: false
        description: 子流程堆栈，json 格式的列表
      - in: query
        name: loop
        schema:
          type: integer
        required: false
        description: 节点循环次数
      - in: query
        name: max_histories
        required: false
        schema:
          type: integer
          default: 3
        description: 仅 MCP 请求有效。限制返回的节点重试历史记录条数，默认 3 条。设置为 0 表示不返回历史记录。非 MCP 请求忽略此参数。
      x-bk-apigateway-resource:
        isPublic: true
        allowApplyPermission: true
        matchSubpath: false
        enableWebsocket: false
        backend:
          name: default
          method: get
          path: /{env.api_sub_path}apigw/get_task_node_detail/{task_id}/{bk_biz_id}/
          matchSubpath: false
          timeout: 0
        pluginConfigs:
        - type: bk-rate-limit
          yaml: "rates:\n  csigssd:\n  - period: 1\n    tokens: 50\n  devops-sops:\n\
